<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fase final mundial</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

    <header class="bg-blue-900 text-white py-6 shadow-md text-center">
        <h1 class="text-3xl font-bold uppercase tracking-wider">Control de Resultados</h1>
        <p class="text-blue-200 text-sm mt-1">Fase actual: Dieciseisavos de Final</p>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-4xl">
        
        <div id="successAlert" class="hidden mb-6 bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg flex items-center shadow-sm">
            <i class="fas fa-check-circle mr-2 text-lg"></i>
            <span>¡Resultados guardados exitosamente en el sistema!</span>
        </div>

        <form id="tournamentForm" onsubmit="saveResults(event)">
            <div id="matchesContainer" class="grid gap-4 md:grid-cols-2">
                </div>

            <div class="mt-8 flex justify-between items-center sticky bottom-4 bg-gray-100/80 backdrop-blur-sm p-4 rounded-xl shadow-xs">
                <button type="button" onclick="goBack()" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-6 rounded-full shadow-lg transition duration-200 transform hover:scale-105 flex items-center gap-2 cursor-pointer">
                    <i class="fas fa-arrow-left"></i> Volver
                </button>
                
                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition duration-200 transform hover:scale-105 flex items-center gap-2 cursor-pointer">
                    <i class="fas fa-save"></i> Guardar los resultados
                </button>
            </div>
        </form>
    </main>

    <footer class="bg-gray-800 text-gray-400 text-center py-4 text-xs mt-auto">
        Plataforma de Gestión de Torneos &copy; 2026
    </footer>

    <script>
        // Data inicial basada en tu estructura de Excel
        const initialMatches = [
            { id: 1, etapa: "DIECISEISAVOS", equipo1: "Alemania", res1: "0", equipo2: "ABCDF", res2: "0" },
            { id: 2, etapa: "DIECISEISAVOS", equipo1: "Por Definir", res1: "", equipo2: "CDFGH", res2: "" },
            { id: 3, etapa: "DIECISEISAVOS", equipo1: "República de Corea", res1: "", equipo2: "Canadá", res2: "" },
            { id: 4, etapa: "DIECISEISAVOS", equipo1: "Suecia", res1: "", equipo2: "Marruecos", res2: "" },
            { id: 5, etapa: "DIECISEISAVOS", equipo1: "Por Definir", res1: "", equipo2: "Por Definir", res2: "" },
            { id: 6, etapa: "DIECISEISAVOS", equipo1: "Uruguay", res1: "", equipo2: "Por Definir", res2: "" },
            { id: 7, etapa: "DIECISEISAVOS", equipo1: "Estados Unidos", res1: "3", equipo2: "BEFIJ", res2: "" },
            { id: 8, etapa: "DIECISEISAVOS", equipo1: "Nueva Zelanda", res1: "3", equipo2: "AEHIJ", res2: "" },
            { id: 9, etapa: "DIECISEISAVOS", equipo1: "Escocia", res1: "", equipo2: "Japón", res2: "" },
            { id: 10, etapa: "DIECISEISAVOS", equipo1: "Costa de Marfil", res1: "", equipo2: "Por Definir", res2: "" },
            { id: 11, etapa: "DIECISEISAVOS", equipo1: "México", res1: "3", equipo2: "CEFHI", res2: "" },
            { id: 12, etapa: "DIECISEISAVOS", equipo1: "Por Definir", res1: "3", equipo2: "EHIJK", res2: "" },
            { id: 13, etapa: "DIECISEISAVOS", equipo1: "Arabia Saudí", res1: "", equipo2: "Por Definir", res2: "" },
            { id: 14, etapa: "DIECISEISAVOS", equipo1: "Australia", res1: "", equipo2: "Irán", res2: "" },
            { id: 15, etapa: "DIECISEISAVOS", equipo1: "Suiza", res1: "3", equipo2: "EFGIJ", res2: "" },
            { id: 16, etapa: "DIECISEISAVOS", equipo1: "Por Definir", res1: "3", equipo2: "DEIJL", res2: "" }
        ];

        const matches = JSON.parse(localStorage.getItem('tournament_matches')) || initialMatches;
        const container = document.getElementById('matchesContainer');

        function renderMatches() {
            container.innerHTML = matches.map(match => `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 hover:shadow-md transition">
                    <div class="flex justify-between items-center border-b border-gray-100 pb-2 mb-3">
                        <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2.5 py-1 rounded-full">ID: ${match.id}</span>
                        <span class="text-xs text-gray-400 uppercase tracking-wider font-semibold">${match.etapa}</span>
                    </div>
                    
                    <div class="grid grid-cols-7 items-center gap-2">
                        <div class="col-span-2 text-right font-medium text-gray-700 truncate text-sm md:text-base" title="${match.equipo1}">
                            ${match.equipo1}
                        </div>
                        
                        <div class="col-span-3 flex justify-center items-center gap-1">
                            <input type="number" 
                                   name="res1_${match.id}" 
                                   min="0" 
                                   value="${match.res1}" 
                                   class="w-12 h-10 text-center border-2 border-gray-300 rounded-lg font-bold text-lg focus:outline-none focus:border-blue-500 bg-gray-50 focus:bg-white transition"
                                   placeholder="-">
                            <span class="text-gray-400 font-bold px-1">vs</span>
                            <input type="number" 
                                   name="res2_${match.id}" 
                                   min="0" 
                                   value="${match.res2}" 
                                   class="w-12 h-10 text-center border-2 border-gray-300 rounded-lg font-bold text-lg focus:outline-none focus:border-blue-500 bg-gray-50 focus:bg-white transition"
                                   placeholder="-">
                        </div>
                        
                        <div class="col-span-2 text-left font-medium text-gray-700 truncate text-sm md:text-base" title="${match.equipo2}">
                            ${match.equipo2}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function saveResults(event) {
            event.preventDefault();
            
            matches.forEach(match => {
                const r1 = document.querySelector(`input[name="res1_${match.id}"]`).value;
                const r2 = document.querySelector(`input[name="res2_${match.id}"]`).value;
                
                match.res1 = r1;
                match.res2 = r2;
            });

            localStorage.setItem('tournament_matches', JSON.stringify(matches));

            const alert = document.getElementById('successAlert');
            alert.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            setTimeout(() => {
                alert.classList.add('hidden');
            }, 4000);

            console.log("Datos listos para enviar a base de datos:", matches);
        }

        // Función para el botón volver
        function goBack() {
            
            window.location.href = 'pronostico.html';
        }

        renderMatches();
    </script>
</body>
</html>
